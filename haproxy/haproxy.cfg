global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 503 /etc/haproxy/errors/503.http

# ─────────────────────────────────────────────────
# FRONTEND: recibe trafico del cliente en puerto 80
# ─────────────────────────────────────────────────
frontend http_front
    bind *:80
    default_backend web_servers

# ─────────────────────────────────────────────────
# BACKEND: distribuye carga entre web1 y web2
# ─────────────────────────────────────────────────
backend web_servers
    balance roundrobin
    option  httpchk GET /health
    server  web1 192.168.100.11:3000 check inter 5s fall 2 rise 2
    server  web2 192.168.100.12:3000 check inter 5s fall 2 rise 2

# ─────────────────────────────────────────────────
# ESTADISTICAS: GUI accesible en puerto 8404
# Desde Mac: http://localhost:8404/stats
# Usuario: admin | Contraseña: admin
# ─────────────────────────────────────────────────
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
    stats show-legends
    stats show-node
    stats admin if TRUE
